<!DOCTYPE html>
<html lang="tk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#667eea">
    <title>Arzan - Önüm Çykarýan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: rgba(255, 255, 255, 0.98);
            padding: 12px 16px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 60px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #667eea;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .about-btn {
            background: #764ba2;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
            white-space: nowrap;
            min-height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .about-btn:active {
            transform: scale(0.95);
            background: #5a3a8a;
        }

        .cart-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            min-height: 40px;
            position: relative;
        }

        .cart-btn:active {
            transform: scale(0.95);
            background: #5a6fd6;
        }

        .cart-count {
            background: #ff4757;
            color: white;
            border-radius: 50%;
            min-width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            padding: 0 6px;
        }

        /* Main Container */
        .main-content {
            padding-top: 80px;
            padding-bottom: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 16px;
        }

        .page-title {
            text-align: center;
            color: white;
            font-size: 28px;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            margin-bottom: 24px;
        }

        /* Arama */
        .search-section {
            max-width: 100%;
            margin: 0 auto 24px;
            position: relative;
            padding: 0 4px;
        }

        .search-input {
            width: 100%;
            padding: 14px 50px 14px 20px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }

        .search-input:focus {
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: #667eea;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-btn:active {
            background: #5a6fd6;
            transform: translateY(-50%) scale(0.9);
        }

        .no-results {
            text-align: center;
            color: white;
            font-size: 16px;
            padding: 30px 20px;
            display: none;
        }

        /* Products Grid */
        .products-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 16px;
            margin-bottom: 30px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .product-info {
            padding: 16px;
        }

        .product-id {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-name {
            font-size: 17px;
            font-weight: 700;
            color: #222;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .product-desc {
            color: #666;
            font-size: 13px;
            margin-bottom: 12px;
            line-height: 1.4;
        }

        .product-price {
            font-size: 24px;
            color: #667eea;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .product-price span {
            font-size: 14px;
            color: #999;
            font-weight: 500;
        }

        .add-to-cart {
            width: 100%;
            background: #667eea;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 48px;
            -webkit-appearance: none;
            appearance: none;
        }

        .add-to-cart:active {
            background: #5a6fd6;
            transform: scale(0.98);
        }

        .add-to-cart.added {
            background: #2ed573;
        }

        /* Cart Modal */
        .cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: flex-end;
        }

        .cart-modal.active {
            display: flex;
        }

        .cart-sidebar {
            background: white;
            width: 100%;
            max-width: 100%;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            animation: slideIn 0.25s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #eee;
        }

        .cart-title {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }

        .close-cart {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-cart:active {
            background: #f1f1f1;
            color: #333;
        }

        .cart-items {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cart-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 12px;
            align-items: center;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            border-radius: 10px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            overflow: hidden;
        }

        .cart-item-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cart-item-info {
            flex: 1;
            min-width: 0;
        }

        .cart-item-id {
            font-size: 11px;
            color: #667eea;
            font-weight: bold;
        }

        .cart-item-name {
            font-size: 14px;
            font-weight: 700;
            color: #333;
            margin: 4px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-item-price {
            color: #667eea;
            font-weight: 700;
            font-size: 14px;
        }

        .qty-controls {
            display: flex;
            gap: 4px;
            align-items: center;
            flex-shrink: 0;
        }

        .qty-btn {
            background: #e9ecef;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
            transition: all 0.2s;
        }

        .qty-btn:active {
            background: #667eea;
            color: white;
            transform: scale(0.9);
        }

        .qty-value {
            font-weight: 700;
            min-width: 24px;
            text-align: center;
            font-size: 15px;
        }

        .remove-item {
            background: #ff4757;
            color: white;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
        }

        .remove-item:active {
            background: #ff3344;
            transform: scale(0.9);
        }

        .cart-empty {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .cart-empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .cart-total {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #eee;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
            margin-bottom: 12px;
            color: #666;
        }

        .total-row.final {
            font-size: 20px;
            font-weight: 800;
            color: #667eea;
            margin-top: 8px;
            padding-top: 12px;
            border-top: 1px solid #eee;
        }

        /* About Modal */
        .about-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .about-modal.active {
            display: flex;
        }

        .about-content {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            padding: 30px 24px;
            animation: fadeIn 0.25s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .about-title {
            font-size: 22px;
            color: #667eea;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 700;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #f8f9fa;
            border-radius: 14px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .contact-item:active {
            background: #667eea;
            color: white;
            transform: scale(0.98);
        }

        .contact-item:active .contact-icon {
            color: white;
        }

        .contact-icon {
            font-size: 22px;
            color: #667eea;
            min-width: 28px;
            text-align: center;
        }

        .contact-text {
            font-size: 15px;
            font-weight: 600;
        }

        .close-about {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-about:active {
            background: #f1f1f1;
            color: #333;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 80px;
            right: 16px;
            left: 16px;
            background: #2ed573;
            color: white;
            padding: 14px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transform: translateY(-100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 3000;
            font-weight: 700;
            font-size: 14px;
            text-align: center;
        }

        .notification.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 16px;
            color: rgba(255,255,255,0.8);
            font-size: 12px;
        }

        /* Tablet ve Desktop */
        @media (min-width: 768px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
            
            .page-title {
                font-size: 36px;
            }
            
            .cart-sidebar {
                max-width: 420px;
            }
        }

        @media (min-width: 1024px) {
            .products-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .container {
                padding: 0 24px;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <a href="#" class="logo" onclick="window.scrollTo({top:0,behavior:'smooth'}); return false;">ARZAN</a>
            <button class="about-btn" onclick="toggleAbout()">📞 Biz Barada</button>
        </div>
        <button class="cart-btn" onclick="toggleCart()">
            🛒 Sebet
            <span class="cart-count" id="cartCount">0</span>
        </button>
    </header>

    <div class="main-content">
        <div class="container">
            <h1 class="page-title">Arzan Önüm Katalogy</h1>
            <p class="subtitle">10 ýörite önüm arasyndan saýlamanyzy ediň</p>
            
            <div class="search-section">
                <input type="text" class="search-input" id="searchInput" placeholder="ID kody boýunça gözle (meselem: A1, B2...)" oninput="searchProducts()">
                <button class="search-btn" onclick="searchProducts()">🔍</button>
            </div>

            <div class="no-results" id="noResults">
                😕 Hiç hili önüm tapylmady. Başga ID kody synanyşyň.
            </div>
            
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>

    <!-- Sebet Modal -->
    <div class="cart-modal" id="cartModal" onclick="closeCartOutside(event)">
        <div class="cart-sidebar" onclick="event.stopPropagation()">
            <div class="cart-header">
                <h2 class="cart-title">🛒 Sebet</h2>
                <button class="close-cart" onclick="toggleCart()">×</button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <div class="cart-total" id="cartTotal" style="display: none;">
                <div class="total-row">
                    <span>Arasynda:</span>
                    <span id="subtotal">0 TMT</span>
                </div>
                <div class="total-row">
                    <span>Eltip bermek:</span>
                    <span>Mugt</span>
                </div>
                <div class="total-row final">
                    <span>Jemi:</span>
                    <span id="totalPrice">0 TMT</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Biz Barada Modal -->
    <div class="about-modal" id="aboutModal" onclick="closeAboutOutside(event)">
        <div class="about-content" onclick="event.stopPropagation()">
            <button class="close-about" onclick="toggleAbout()">×</button>
            <h2 class="about-title">📞 Biz Barada</h2>
            <div class="contact-info">
                <div class="contact-item" onclick="window.location.href='tel:+99671178626'">
                    <span class="contact-icon">📱</span>
                    <span class="contact-text">Tel: +99671178626</span>
                </div>
                <div class="contact-item">
                    <span class="contact-icon">💬</span>
                    <span class="contact-text">Imo: arzan.71</span>
                </div>
                <div class="contact-item" onclick="window.location.href='mailto:arzan.com'">
                    <span class="contact-icon">✉️</span>
                    <span class="contact-text">Gmail: arzan.com</span>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <footer class="footer">
        <p>© 2026 Arzan - Ähli hukuklar goragly</p>
    </footer>

        const products = [

            { id: "A2", name: "Sary Krokodil Desenli Sumka", description: "El ýasalma, premium deri, stil dizayn. Günlük ulanyş üçin ideýal.", price: 90, currency: "TMT", image: images.bag },
            { id: "A3", name: "Sary sumka" , description: "Elde yasalan, rahat,deriden." price:110, currrency: "TMT", image:A3.jpg},
            { id: "B1", name: "Akyllly Sagat Pro", description: "GPS, ýürek urşuny ölçeýji, suw geçirmeýän. Sport we saglyk gözegçiligi üçin.", price: 120, currency: "TMT", image: images.watch },

            { id: "C1", name: "Wintage Deri Gapjyk", description: "El ýasalma, RFID goragly, 12 kartlyk. Wagtyňyz stili.", price: 45, currency: "TMT", image: images.wallet },
            { id: "C2", name: "Sport Aýakgap", description: "Ýeňil, dem alyjy, ýokary rahatlyk. Ylgamak we günlük ulanyş.", price: 110, currency: "TMT", image: images.shoe },

            { id: "E1", name: "Parfüm Essence", description: "Tebigy düzümler, uzak wagtyňyz galýan. Täze we özüne çekiji ys.", price: 95, currency: "TMT", image: images.perfume },
            { id: "E2", name: "Laptop Stendi", description: "Alýumin, ergonomik, sazlanýan. Sagdyn işleýiş pozisiýasy.", price: 55, currency: "TMT", image: images.laptop }
        ];

        let cart = [];
        let filteredProducts = [...products];

        function renderProducts(productList = products) {
            const grid = document.getElementById('productsGrid');
            const noResults = document.getElementById('noResults');
            
            if (productList.length === 0) {
                grid.innerHTML = '';
                noResults.style.display = 'block';
                return;
            }
            
            noResults.style.display = 'none';
            grid.innerHTML = productList.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}" class="product-image" loading="lazy">
                    <div class="product-info">
                        <span class="product-id">ID: ${product.id}</span>
                        <h3 class="product-name">${product.name}</h3>
                        <p class="product-desc">${product.description}</p>
                        <div class="product-price">${product.price} <span>${product.currency}</span></div>
                        <button class="add-to-cart" onclick="addToCart('${product.id}')" id="btn-${product.id}">
                            <span>🛒</span> Sebede Goş
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function searchProducts() {
            const searchTerm = document.getElementById('searchInput').value.trim().toUpperCase();
            
            if (searchTerm === '') {
                filteredProducts = [...products];
            } else {
                filteredProducts = products.filter(product => 
                    product.id.toUpperCase().includes(searchTerm) ||
                    product.name.toUpperCase().includes(searchTerm)
                );
            }
            
            renderProducts(filteredProducts);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existingItem = cart.find(item => item.id === productId);

            if (existingItem) {
                existingItem.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }

            updateCartUI();
            showNotification(`"${product.name}" sebede goşuldy!`);
            
            const btn = document.getElementById(`btn-${productId}`);
            btn.classList.add('added');
            btn.innerHTML = '<span>✓</span> Goşuldy!';
            setTimeout(() => {
                btn.classList.remove('added');
                btn.innerHTML = '<span>🛒</span> Sebede Goş';
            }, 1500);
        }

        function removeFromCart(productId) {
            cart = cart.filter(item => item.id !== productId);
            updateCartUI();
        }

        function updateQuantity(productId, change) {
            const item = cart.find(item => item.id === productId);
            if (item) {
                item.quantity += change;
                if (item.quantity <= 0) {
                    removeFromCart(productId);
                } else {
                    updateCartUI();
                }
            }
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            const subtotal = document.getElementById('subtotal');
            const totalPrice = document.getElementById('totalPrice');

            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            cartCount.textContent = totalItems;

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="cart-empty">
                        <div class="cart-empty-icon">🛒</div>
                        <p>Sebet boş</p>
                        <p style="font-size: 14px; margin-top: 10px; color: #999;">Önümleri gözlemäge başlaň!</p>
                    </div>
                `;
                cartTotal.style.display = 'none';
            } else {
                cartItems.innerHTML = cart.map(item => `
                    <div class="cart-item">
                        <div class="cart-item-img">
                            <img src="${item.image}" alt="${item.name}">
                        </div>
                        <div class="cart-item-info">
                            <div class="cart-item-id">ID: ${item.id}</div>
                            <div class="cart-item-name">${item.name}</div>
                            <div class="cart-item-price">${item.price} ${item.currency} x ${item.quantity}</div>
                        </div>
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQuantity('${item.id}', -1)">−</button>
                            <span class="qty-value">${item.quantity}</span>
                            <button class="qty-btn" onclick="updateQuantity('${item.id}', 1)">+</button>
                        </div>
                        <button class="remove-item" onclick="removeFromCart('${item.id}')">×</button>
                    </div>
                `).join('');

                const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                subtotal.textContent = `${total} ${cart[0].currency}`;
                totalPrice.textContent = `${total} ${cart[0].currency}`;
                cartTotal.style.display = 'block';
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            modal.classList.toggle('active');
            document.body.style.overflow = modal.classList.contains('active') ? 'hidden' : '';
        }

        function toggleAbout() {
            const modal = document.getElementById('aboutModal');
            modal.classList.toggle('active');
            document.body.style.overflow = modal.classList.contains('active') ? 'hidden' : '';
        }

        function closeCartOutside(event) {
            if (event.target === event.currentTarget) toggleCart();
        }

        function closeAboutOutside(event) {
            if (event.target === event.currentTarget) toggleAbout();
        }

        function showNotification(message) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.classList.add('show');
            setTimeout(() => notification.classList.remove('show'), 2500);
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderProducts();
            updateCartUI();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const cartModal = document.getElementById('cartModal');
                const aboutModal = document.getElementById('aboutModal');
                if (cartModal.classList.contains('active')) toggleCart();
                if (aboutModal.classList.contains('active')) toggleAbout();
            }
        });
    </script>
